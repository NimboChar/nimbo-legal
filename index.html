<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIMBO — Documentos Legais</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,
"Helvetica Neue",Arial,sans-serif;line-height:1.7;color:#1a1a2e;
background:#fafafa;min-height:100vh;display:flex;flex-direction:column;
align-items:center;justify-content:center;padding:2rem}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.06);
padding:3rem 2.5rem;max-width:420px;width:100%;text-align:center}
.logo{font-size:2.5rem;margin-bottom:.25rem}
h1{font-size:1.5rem;font-weight:700;color:#1a1a2e;margin-bottom:.25rem}
.subtitle{color:#8888a0;font-size:.875rem;margin-bottom:2rem}
.links{display:flex;flex-direction:column;gap:.75rem}
.links a{display:block;padding:.875rem 1.25rem;background:#f0eeff;
color:#7C5CFF;border-radius:10px;text-decoration:none;font-weight:600;
font-size:.9375rem;transition:all .15s ease}
.links a:hover{background:#7C5CFF;color:#fff}
.footer{margin-top:2rem;color:#8888a0;font-size:.75rem;opacity:.5}
@media(max-width:600px){
body{padding:1rem}
.card{padding:2rem 1.5rem}
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">☁</div>
  <h1>NIMBO</h1>
  <p class="subtitle">Documentos Legais</p>

  <div class="links">
    <a href="./privacy/">Política de Privacidade</a>
    <a href="./terms/">Termos de Uso</a>
  </div>
</div>

<p class="footer">© 2025 NIMBO — nimbocloud.app@gmail.com</p>

</body>
</html>
